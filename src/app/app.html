<main>
  <header>
    <h1>Aquisição de cartões</h1>
    <a class="cart-link" href="/carrinho" (click)="goToCart($event)" aria-label="Ir para o carrinho">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2zM7.16 14h9.98c.75 0 1.4-.41 1.73-1.03L22 6.5V5H6.21l-.94-2H2v2h2l3.6 7.59-1.35 2.44C5.52 16.37 6.48 18 8 18h12v-2H8l1.16-2z"/>
      </svg>
      @if (carrinhoState.quantidade() > 0) {
        <span class="cart-badge" aria-label="Itens no carrinho">{{ carrinhoState.quantidade() }}</span>
      }
    </a>
  </header>
  
  <section>
    <router-outlet></router-outlet>
  </section>
</main>
