<header>
  <div class="header-left">
    <button *ngIf="showBack" class="back-link" type="button" aria-label="Voltar para home" (click)="onHomeClick()">
      <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
    </button>

    <h1 *ngIf="title">{{ title }}</h1>
  </div>

  <button class="cart-link" type="button" aria-label="Ir para o carrinho" (click)="onCartClick()">
    <i class="fa-solid fa-cart-shopping" aria-hidden="true"></i>
    <span *ngIf="cartQuantidade > 0" class="cart-badge" aria-label="Itens no carrinho">{{ cartQuantidade }}</span>
  </button>
</header>
